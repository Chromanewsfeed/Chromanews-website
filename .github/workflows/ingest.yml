name: Ingest News
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
  push:
    branches: [main]
jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      - name: Run Ingest
        run: |
          node -e "
          const handler = require('./api/ingest.js');
          const req = {};
          const res = {
            status: (code) => ({ json: (data) => console.log(code, JSON.stringify(data)) })
          };
          handler(req, res).catch(console.error);
          "
      - name: Refresh Red Flags
        run: curl -s "https://chromanews.com/api/redflags?refresh=1" || true
      - name: Refresh Opinion
        run: curl -s "https://chromanews.com/api/opinion?refresh=1" || true
