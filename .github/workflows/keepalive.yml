name: Keepalive
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
jobs:
  keepalive:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      - name: Keepalive commit
        run: |
          echo "$(date -u)" > .keepalive
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add .keepalive
          git diff --staged --quiet || git commit -m "chore: keepalive"
          git push
